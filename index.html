<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Princess Airways ✈️</title>

<style>
body{
  margin:0;
  height:100svh;
  overflow:hidden;
  font-family:Georgia, serif;
  display:flex;
  justify-content:center;
  align-items:center;
  color:white;
  background: linear-gradient(135deg,#ff9ecf,#ffc3a0,#ffb6f9,#a0e7ff);
  background-size:400% 400%;
  animation:gradient 18s ease infinite;
}

@keyframes gradient{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

.screen{
  position:absolute;
  inset:0;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:20px;
  opacity:0;
  pointer-events:none;
  transition:0.7s;
}

.screen.active{
  opacity:1;
  pointer-events:auto;
}

.card{
  backdrop-filter: blur(20px);
  background:rgba(255,255,255,0.25);
  padding:35px;
  border-radius:28px;
  box-shadow:0 0 50px rgba(255,255,255,0.6);
  transition:0.4s;
}

button{
  margin-top:20px;
  padding:12px 26px;
  border:none;
  border-radius:30px;
  background:white;
  color:#ff3e9e;
  font-size:16px;
}

.phrase{
  margin-top:15px;
  font-size:18px;
  min-height:24px;
  transition:0.3s;
}

.panel{
  margin:15px;
  padding:18px 30px;
  border-radius:40px;
  background:rgba(255,255,255,0.4);
  backdrop-filter:blur(15px);
  font-size:18px;
}

.bottomSheet{
  position:absolute;
  bottom:-100%;
  width:100%;
  background:rgba(255,255,255,0.85);
  color:#ff3e9e;
  padding:30px;
  text-align:center;
  transition:0.4s;
  border-radius:30px 30px 0 0;
}

.bottomSheet.show{
  bottom:0;
}

.heart{
  position:absolute;
  bottom:-20px;
  font-size:20px;
  animation:floatUp 3s linear forwards;
}

@keyframes floatUp{
  to{
    transform:translateY(-120vh);
    opacity:0;
  }
}

</style>
</head>
<body>

<audio id="paper" preload="auto" src="paper-rings.mp3"></audio>
<audio id="lover" preload="auto" src="lover.mp3"></audio>

<!-- SCENE 1 -->
<div class="screen active" id="s1">
  <div class="card">
    <h2>Princess Airways</h2>
    <p>
      Passenger: <strong>Ashwini</strong><br>
      Seat: 13A<br>
      Gate: 1989<br>
      Flight: TS-13<br>
      Destination: Birthday Era
    </p>
    <button onclick="scanPass()">Scan Boarding Pass</button>
    <div class="phrase" id="phrase"></div>
  </div>
</div>

<!-- SCENE 2 -->
<div class="screen" id="s2">
  <h2>Cabin Phase ✨</h2>
  <div class="panel" onclick="refreshments()">🍫 Refreshments</div>
  <div class="panel" onclick="seatbelt()">💺 Seatbelt</div>
  <div class="panel" onclick="princessMode()">👑 Princess Mode</div>
</div>

<div class="bottomSheet" id="sheet"></div>

<script>

const paper=document.getElementById("paper");
const lover=document.getElementById("lover");

let fadeTriggered=false;

function scanPass(){

  const phrase=document.getElementById("phrase");

  const lines=[
    "Validating cutie credentials...",
    "Princess status verified 👑",
    "Seat 13A: Certified Heartbreaker 💘",
    "Boarding granted ✨"
  ];

  let i=0;

  const interval=setInterval(()=>{
    phrase.innerText=lines[i];
    i++;
    if(i>=lines.length){
      clearInterval(interval);
      setTimeout(startExperience,1000);
    }
  },1200);
}

function startExperience(){
  switchScene("s2");
  startMusic();
}

function switchScene(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function startMusic(){

  paper.volume=0.8;
  paper.play();

  paper.addEventListener("timeupdate",()=>{
    if(paper.currentTime>=40 && !fadeTriggered){
      fadeTriggered=true;
      crossfade();
    }
  });

  setTimeout(captainSpeak,10000);
}

function crossfade(){

  lover.volume=0;
  lover.play();

  let fade=setInterval(()=>{
    if(paper.volume>0){
      paper.volume-=0.05;
    } else {
      clearInterval(fade);
      paper.pause();
      paper.currentTime=0;
      paper.src="";
      paper.load();
    }
  },120);

  let fadeIn=setInterval(()=>{
    if(lover.volume<0.9){
      lover.volume+=0.05;
    } else clearInterval(fadeIn);
  },120);
}

function captainSpeak(){
  const utter=new SpeechSynthesisUtterance(
  "Good evening passengers. This flight is dedicated to the most beautiful girl on board, Ashwini. We are now departing for Lonavala.");

  const voices=speechSynthesis.getVoices();
  const preferred=voices.find(v=>v.name.includes("Samantha"));
  if(preferred) utter.voice=preferred;

  utter.rate=0.95;
  utter.pitch=1;
  speechSynthesis.speak(utter);
}

function refreshments(){
  showSheet("Snack drawer unlocked 🍫 KitKat minis stocked.");
}

function seatbelt(){
  showSheet("Seatbelt secured. You're stuck with me 💕");
}

function princessMode(){
  showSheet("Princess Mode Activated ✨");
  for(let i=0;i<15;i++){
    const heart=document.createElement("div");
    heart.className="heart";
    heart.style.left=Math.random()*100+"vw";
    heart.innerText="💗";
    document.body.appendChild(heart);
    setTimeout(()=>heart.remove(),3000);
  }
}

function showSheet(text){
  const sheet=document.getElementById("sheet");
  sheet.innerText=text;
  sheet.classList.add("show");
  setTimeout(()=>sheet.classList.remove("show"),2500);
}

</script>
</body>
</html>
