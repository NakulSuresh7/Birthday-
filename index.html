<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Princess Airways ✈️</title>

<style>
body{
  margin:0;
  height:100svh;
  overflow:hidden;
  font-family:Georgia, serif;
  display:flex;
  justify-content:center;
  align-items:center;
  color:white;
  background: linear-gradient(135deg,#ff9ecf,#ffc3a0,#ffb6f9,#a0e7ff);
  background-size:400% 400%;
  animation:gradient 18s ease infinite;
}

@keyframes gradient{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

.screen{
  position:absolute;
  inset:0;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:20px;
  opacity:0;
  pointer-events:none;
  transition:0.7s;
}

.screen.active{
  opacity:1;
  pointer-events:auto;
}

.card{
  backdrop-filter: blur(20px);
  background:rgba(255,255,255,0.25);
  padding:35px;
  border-radius:28px;
  box-shadow:0 0 50px rgba(255,255,255,0.6);
}

button{
  margin-top:20px;
  padding:12px 26px;
  border:none;
  border-radius:30px;
  background:white;
  color:#ff3e9e;
  font-size:16px;
}

.panel{
  margin:15px;
  padding:18px 30px;
  border-radius:40px;
  background:rgba(255,255,255,0.4);
  backdrop-filter:blur(15px);
  font-size:18px;
}

.phrase{
  margin-top:15px;
  min-height:24px;
}

.bottomSheet{
  position:absolute;
  bottom:-100%;
  width:100%;
  background:rgba(255,255,255,0.85);
  color:#ff3e9e;
  padding:30px;
  text-align:center;
  transition:0.4s;
  border-radius:30px 30px 0 0;
}

.bottomSheet.show{
  bottom:0;
}
</style>
</head>
<body>

<!-- SCENE 1 -->
<div class="screen active" id="s1">
  <div class="card">
    <h2>Princess Airways</h2>
    <p>
      Passenger: <strong>Ashwini</strong><br>
      Seat: 13A<br>
      Gate: 1989<br>
      Flight: TS-13<br>
      Destination: Birthday Era
    </p>
    <button onclick="scanPass()">Scan Boarding Pass</button>
    <div class="phrase" id="phrase"></div>
  </div>
</div>

<!-- SCENE 2 -->
<div class="screen" id="s2">
  <h2>Cabin Phase ✨</h2>
  <div class="panel" onclick="refreshments()">🍫 Refreshments</div>
  <div class="panel" onclick="seatbelt()">💺 Seatbelt</div>
  <div class="panel" onclick="princessMode()">👑 Princess Mode</div>
</div>

<div class="bottomSheet" id="sheet"></div>

<script>

let audioContext;
let paperBuffer, loverBuffer, captainBuffer;
let paperSource, loverSource;
let fadeDone = false;

async function scanPass(){

  const phrase=document.getElementById("phrase");

  const lines=[
    "Validating cutie credentials...",
    "Princess status verified 👑",
    "Seat 13A confirmed 💕",
    "Boarding granted ✨"
  ];

  let i=0;

  const interval=setInterval(()=>{
    phrase.innerText=lines[i];
    i++;
    if(i>=lines.length){
      clearInterval(interval);
      setTimeout(()=>{
        switchScene("s2");
        initAudio();
      },800);
    }
  },1000);
}

function switchScene(id){
  document.querySelectorAll(".screen").forEach(s=>{
    s.classList.remove("active");
  });
  document.getElementById(id).classList.add("active");
}

async function initAudio(){
  try{
    audioContext = new (window.AudioContext || window.webkitAudioContext)();
    await audioContext.resume();

    paperBuffer = await loadAudio("paper-rings.mp3");
    loverBuffer = await loadAudio("lover.mp3");
    captainBuffer = await loadAudio("captain.mp3");

    if(!paperBuffer){
      console.error("Paper Rings failed to load.");
      return;
    }

    startPaper();

  } catch(e){
    console.error("Audio init failed:", e);
  }
}

async function loadAudio(url){
  try{
    const response = await fetch(url);
    const arrayBuffer = await response.arrayBuffer();
    return await audioContext.decodeAudioData(arrayBuffer);
  } catch(e){
    console.error("Failed loading:", url, e);
    return null;
  }
}

function startPaper(){

  paperSource = audioContext.createBufferSource();
  paperSource.buffer = paperBuffer;

  const paperGain = audioContext.createGain();
  paperGain.gain.value = 1;

  paperSource.connect(paperGain).connect(audioContext.destination);
  paperSource.start();

  // Captain at 8 seconds
  if(captainBuffer){
    setTimeout(playCaptain,8000);
  }

  // Crossfade at 45 seconds
  setTimeout(()=>crossfade(paperGain),45000);
}

function playCaptain(){

  const captainSource = audioContext.createBufferSource();
  captainSource.buffer = captainBuffer;

  const captainGain = audioContext.createGain();
  captainGain.gain.value = 1;

  captainSource.connect(captainGain).connect(audioContext.destination);
  captainSource.start();
}

function crossfade(paperGain){

  if(fadeDone) return;
  fadeDone = true;

  // Fade out Paper Rings
  paperGain.gain.linearRampToValueAtTime(
    0,
    audioContext.currentTime + 4
  );

  // Start Lover
  if(!loverBuffer) return;

  loverSource = audioContext.createBufferSource();
  loverSource.buffer = loverBuffer;

  const loverGain = audioContext.createGain();
  loverGain.gain.value = 0;

  loverSource.connect(loverGain).connect(audioContext.destination);
  loverSource.start();

  // Fade in Lover
  loverGain.gain.linearRampToValueAtTime(
    1,
    audioContext.currentTime + 4
  );
}

function refreshments(){
  showSheet("Snack drawer unlocked 🍫 KitKat minis stocked.");
}

function seatbelt(){
  showSheet("Seatbelt secured. You're stuck with me 💕");
}

function princessMode(){
  showSheet("Princess Mode Activated ✨");
}

function showSheet(text){
  const sheet=document.getElementById("sheet");
  sheet.innerText=text;
  sheet.classList.add("show");
  setTimeout(()=>sheet.classList.remove("show"),2500);
}

</script>
</body>
</html>
