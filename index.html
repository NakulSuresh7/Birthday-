<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Princess Airways ✈️</title>

<style>
body{
  margin:0;
  height:100svh;
  overflow:hidden;
  font-family:Georgia, serif;
  display:flex;
  justify-content:center;
  align-items:center;
  color:white;
  background: linear-gradient(135deg,#ffb6d9,#ffc3a0,#d8b4f8,#a0e7ff);
  background-size:400% 400%;
  animation:gradient 20s ease infinite;
  transition:background 2s ease;
}

@keyframes gradient{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

.screen{
  position:absolute;
  inset:0;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:20px;
  opacity:0;
  pointer-events:none;
  transition:1s;
}

.screen.active{
  opacity:1;
  pointer-events:auto;
}

.card{
  backdrop-filter: blur(15px);
  background:rgba(255,255,255,0.25);
  padding:30px;
  border-radius:20px;
  box-shadow:0 0 40px rgba(255,255,255,0.4);
  transition:0.6s;
}

button{
  margin-top:20px;
  padding:12px 24px;
  border:none;
  border-radius:30px;
  background:white;
  color:#ff69b4;
  font-size:16px;
}

.message{
  margin-top:20px;
  font-size:18px;
  opacity:0;
  transition:0.5s;
}

.message.show{
  opacity:1;
}

/* Runway lights */
.runway{
  position:absolute;
  bottom:10%;
  display:flex;
  gap:15px;
}

.light{
  width:10px;
  height:10px;
  border-radius:50%;
  background:white;
  opacity:0.3;
  animation:blink 1.5s infinite;
}

@keyframes blink{
  0%{opacity:0.2;}
  50%{opacity:1;}
  100%{opacity:0.2;}
}

/* Shake animation */
@keyframes shake{
  0%{transform:translateX(0);}
  25%{transform:translateX(-5px);}
  50%{transform:translateX(5px);}
  75%{transform:translateX(-5px);}
  100%{transform:translateX(0);}
}

.glow{
  text-shadow:0 0 20px white,0 0 40px pink;
}

</style>
</head>
<body>

<audio id="paper">
  <source src="paper-rings.mp3" type="audio/mpeg">
</audio>

<audio id="lover">
  <source src="lover.mp3" type="audio/mpeg">
</audio>

<!-- SCENE 1 -->
<div class="screen active" id="s1">
  <div class="card" id="card">
    <h2>Princess Airways</h2>
    <p>
      Passenger: <strong>Ashwini</strong><br>
      Seat: 13A<br>
      Gate: 1989<br>
      Flight: TS-13<br>
      Destination: Birthday Era
    </p>
    <button onclick="proceedBoarding()">Proceed to Boarding</button>
    <div class="message" id="preMsg"></div>
  </div>
</div>

<!-- SCENE 2 -->
<div class="screen" id="s2">
  <h2>Cabin Phase ✨</h2>
  <button onclick="showMsg('Dashboard compartment unlocked.')">🍫 Refreshments</button>
  <button onclick="showMsg('Seatbelt secured. You are stuck with me forever.')">💺 Seatbelt</button>
  <button onclick="showMsg('Princess status confirmed.')">👑 Princess Mode</button>
</div>

<!-- SCENE 3 -->
<div class="screen" id="s3">
  <h2 class="glow">Final Destination</h2>
  <h3 id="finalText"></h3>
</div>

<div class="runway" id="runway"></div>

<script>

const paper = document.getElementById("paper");
const lover = document.getElementById("lover");
let musicStarted = false;

/* Create runway lights */
const runway = document.getElementById("runway");
for(let i=0;i<10;i++){
  const light=document.createElement("div");
  light.className="light";
  light.style.animationDelay=(i*0.2)+"s";
  runway.appendChild(light);
}

function proceedBoarding(){

  const msg = document.getElementById("preMsg");
  msg.innerText="Passenger Ashwini, please proceed to Gate 1989.";
  msg.classList.add("show");

  setTimeout(()=>{
    msg.innerText="Warning: Excessive Cuteness Detected.";
  },2000);

  setTimeout(()=>{
    document.getElementById("card").style.animation="shake 0.5s";
  },3500);

  setTimeout(()=>{
    startTakeoff();
  },5000);
}

function startTakeoff(){

  switchScene("s2");

  paper.volume=0.5;
  paper.play().catch(()=>{});
  musicStarted = true;

  setTimeout(captainSpeak,15000);

  // Force Lover fade at 60 seconds
  setTimeout(()=>{
    shiftToLover();
  },60000);
}

function switchScene(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function showMsg(text){
  const msg = document.createElement("div");
  msg.className="message show";
  msg.innerText=text;
  document.getElementById("s2").appendChild(msg);
  setTimeout(()=>msg.remove(),2500);
}

function captainSpeak(){

  paper.volume=0.3;

  const utter = new SpeechSynthesisUtterance(
  "Good evening passengers. This flight is dedicated to the most beautiful girl on board, Ashwini. We are now departing for Lonavala.");

  const voices = speechSynthesis.getVoices();
  const preferred = voices.find(v=>v.name.includes("Samantha")||v.lang.includes("en"));
  if(preferred) utter.voice=preferred;

  utter.rate=0.9;
  speechSynthesis.speak(utter);
}

function shiftToLover(){

  let fade = setInterval(()=>{
    if(paper.volume>0){
      paper.volume-=0.02;
    }else{
      clearInterval(fade);
      paper.pause();
      lover.volume=0;
      lover.play();
      fadeInLover();
    }
  },200);
}

function fadeInLover(){
  let fade = setInterval(()=>{
    if(lover.volume<0.6){
      lover.volume+=0.02;
    }else clearInterval(fade);
  },200);
}

/* Final landing after 120s */
setTimeout(()=>{
  if(musicStarted){
    switchScene("s3");
    typeText("You are my favorite place to land. Happy Birthday, Ashwini.");
  }
},120000);

function typeText(text){
  let i=0;
  const el=document.getElementById("finalText");
  const interval=setInterval(()=>{
    el.innerHTML+=text.charAt(i);
    i++;
    if(i>=text.length) clearInterval(interval);
  },50);
}

</script>
</body>
</html>
