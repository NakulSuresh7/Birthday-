<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Princess Airways ✈️</title>

<style>
body{
  margin:0;
  height:100svh;
  overflow:hidden;
  font-family:Georgia, serif;
  display:flex;
  justify-content:center;
  align-items:center;
  color:white;
  background: linear-gradient(135deg,#2c1a47,#3c2a6e,#5c3d91,#2b5876);
  background-size:400% 400%;
  animation:gradient 25s ease infinite;
}

@keyframes gradient{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

.screen{
  position:absolute;
  inset:0;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:20px;
  opacity:0;
  pointer-events:none;
  transition:0.8s;
}

.screen.active{
  opacity:1;
  pointer-events:auto;
}

.card{
  backdrop-filter: blur(18px);
  background:rgba(255,255,255,0.12);
  padding:35px;
  border-radius:24px;
  box-shadow:0 0 50px rgba(255,255,255,0.2);
  transition:0.4s;
}

.card.tilt{
  transform:rotateX(8deg) scale(1.05);
  box-shadow:0 0 60px rgba(255,182,255,0.6);
}

button{
  margin-top:20px;
  padding:12px 24px;
  border:none;
  border-radius:30px;
  background:#ffffff;
  color:#ff69b4;
  font-size:16px;
}

.runway{
  position:absolute;
  bottom:8%;
  display:flex;
  gap:15px;
}

.light{
  width:8px;
  height:8px;
  border-radius:50%;
  background:white;
  opacity:0.3;
  animation:blink 1.8s infinite;
}

@keyframes blink{
  0%{opacity:0.2;}
  50%{opacity:1;}
  100%{opacity:0.2;}
}

.bottomSheet{
  position:absolute;
  bottom:-100%;
  width:100%;
  background:rgba(0,0,0,0.6);
  padding:30px;
  text-align:center;
  transition:0.5s;
}

.bottomSheet.show{
  bottom:0;
}

.glow{
  text-shadow:0 0 20px #ff9dfc,0 0 40px #ff69b4;
}
</style>
</head>
<body>

<audio id="paper" preload="auto">
  <source src="paper-rings.mp3" type="audio/mpeg">
</audio>

<audio id="lover" preload="auto">
  <source src="lover.mp3" type="audio/mpeg">
</audio>

<!-- SCENE 1 -->
<div class="screen active" id="s1">
  <div class="card" id="card" onclick="tiltCard()">
    <h2>Princess Airways</h2>
    <p>
      Passenger: <strong>Ashwini</strong><br>
      Seat: 13A<br>
      Gate: 1989<br>
      Flight: TS-13<br>
      Destination: Birthday Era
    </p>
    <button onclick="scanPass(event)">Scan Boarding Pass</button>
  </div>
</div>

<!-- SCENE 2 -->
<div class="screen" id="s2">
  <h2>Cabin Phase ✨</h2>
  <button onclick="refreshments()">🍫 Refreshments</button>
  <button onclick="seatbelt()">💺 Seatbelt</button>
  <button onclick="princessMode()">👑 Princess Mode</button>
</div>

<!-- SCENE 3 -->
<div class="screen" id="s3">
  <h2 class="glow">Final Destination</h2>
  <h3 id="finalText"></h3>
</div>

<div class="runway" id="runway"></div>
<div class="bottomSheet" id="sheet"></div>

<script>

const paper = document.getElementById("paper");
const lover = document.getElementById("lover");
let fadeTriggered=false;
let timeListener;

const runway=document.getElementById("runway");
for(let i=0;i<12;i++){
  const light=document.createElement("div");
  light.className="light";
  light.style.animationDelay=(i*0.15)+"s";
  runway.appendChild(light);
}

function tiltCard(){
  document.getElementById("card").classList.add("tilt");
}

function scanPass(e){
  e.stopPropagation();
  startExperience();
}

function startExperience(){
  switchScene("s2");
  startMusic();
}

function switchScene(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function startMusic(){
  paper.volume=0.7;
  paper.play();

  timeListener = ()=>{
    if(paper.currentTime >= 45 && !fadeTriggered){
      fadeTriggered=true;
      shiftToLover();
    }
  };

  paper.addEventListener("timeupdate", timeListener);

  setTimeout(captainSpeak,10000);

  setTimeout(()=>{
    switchScene("s3");
    typeText("You are my favorite place to land. Happy Birthday, Ashwini.");
  },75000);
}

function captainSpeak(){
  paper.volume=0.5;
  const utter = new SpeechSynthesisUtterance(
  "Good evening passengers. This flight is dedicated to the most beautiful girl on board, Ashwini. We are now departing for Lonavala.");
  
  const voices = speechSynthesis.getVoices();
  const preferred = voices.find(v=>v.name.includes("Samantha"));
  if(preferred) utter.voice=preferred;

  utter.rate=0.92;
  utter.pitch=0.95;
  speechSynthesis.speak(utter);
}

function shiftToLover(){
  lover.volume=0;
  lover.play();

  let fade=setInterval(()=>{
    if(paper.volume>0){
      paper.volume-=0.03;
    } else {
      clearInterval(fade);
      paper.pause();
      paper.currentTime=0;
      paper.removeEventListener("timeupdate", timeListener);
    }
  },150);

  let fadeIn=setInterval(()=>{
    if(lover.volume<0.8){
      lover.volume+=0.03;
    } else clearInterval(fadeIn);
  },150);
}

function refreshments(){
  showSheet("KitKat Minis stocked for Princess 👑");
}

function seatbelt(){
  showSheet("Seatbelt locked in. No escaping me 💕");
}

function princessMode(){
  document.body.style.filter="brightness(1.2)";
  showSheet("Princess Mode Activated ✨");
}

function showSheet(text){
  const sheet=document.getElementById("sheet");
  sheet.innerText=text;
  sheet.classList.add("show");
  setTimeout(()=>sheet.classList.remove("show"),2500);
}

function typeText(text){
  let i=0;
  const el=document.getElementById("finalText");
  const interval=setInterval(()=>{
    el.innerHTML+=text.charAt(i);
    i++;
    if(i>=text.length) clearInterval(interval);
  },35);
}

</script>
</body>
</html>
