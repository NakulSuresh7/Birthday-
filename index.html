<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Princess Airways ✈️</title>

<style>
body{
  margin:0;
  height:100svh;
  overflow:hidden;
  font-family:Georgia, serif;
  display:flex;
  justify-content:center;
  align-items:center;
  color:white;
  background: linear-gradient(135deg,#ffb6d9,#ffc3a0,#d8b4f8,#a0e7ff);
  background-size:400% 400%;
  animation:gradient 20s ease infinite;
  transition:background 2s ease;
}

@keyframes gradient{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

.screen{
  position:absolute;
  inset:0;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:20px;
  opacity:0;
  pointer-events:none;
  transition:1s;
}

.screen.active{
  opacity:1;
  pointer-events:auto;
}

.card{
  backdrop-filter: blur(15px);
  background:rgba(255,255,255,0.2);
  padding:30px;
  border-radius:20px;
  box-shadow:0 0 40px rgba(255,255,255,0.4);
  transition:0.8s;
}

button{
  margin-top:20px;
  padding:12px 24px;
  border:none;
  border-radius:30px;
  background:white;
  color:#ff69b4;
  font-size:16px;
}

.message{
  position:absolute;
  bottom:18%;
  font-size:18px;
  opacity:0;
  transition:0.6s;
}

.message.show{
  opacity:1;
}

.glow{
  text-shadow:0 0 20px white,0 0 40px pink;
}

.particle{
  position:absolute;
  width:6px;
  height:6px;
  border-radius:50%;
  background:white;
  opacity:0.6;
  animation:float 12s linear infinite;
}

@keyframes float{
  from{transform:translateY(100vh);}
  to{transform:translateY(-10vh);}
}
</style>
</head>
<body>

<audio id="paper">
  <source src="paper-rings.mp3" type="audio/mpeg">
</audio>

<audio id="lover">
  <source src="lover.mp3" type="audio/mpeg">
</audio>

<!-- SCENE 1 -->
<div class="screen active" id="s1">
  <div class="card" id="boardingCard">
    <h2>Princess Airways</h2>
    <p>
      Passenger: <strong>Ashwini</strong><br>
      Seat: 13A<br>
      Gate: 1989<br>
      Flight: TS-13<br>
      Destination: Birthday Era
    </p>
    <button onclick="startExperience()">Begin Boarding</button>
  </div>
</div>

<!-- SCENE 2 -->
<div class="screen" id="s2">
  <h2>Cabin Interaction ✨</h2>
  <button onclick="showMsg('Dashboard compartment unlocked.')">🍫 Refreshments</button>
  <button onclick="showMsg('Seatbelt secured. You are stuck with me forever.')">💺 Seatbelt</button>
  <button onclick="showMsg('Princess status confirmed.')">👑 Princess Mode</button>
</div>

<!-- SCENE 3 -->
<div class="screen" id="s3">
  <h2>Captain Speaking 🎙</h2>
</div>

<!-- SCENE 4 -->
<div class="screen" id="s4">
  <h2>Approaching Birthday Era 🌅</h2>
</div>

<!-- SCENE 5 -->
<div class="screen" id="s5">
  <h2 class="glow">Final Destination</h2>
  <h3 id="finalText"></h3>
</div>

<div class="message" id="msgBox"></div>

<script>

const paper = document.getElementById("paper");
const lover = document.getElementById("lover");

function startExperience(){

  // ensure audio allowed
  paper.volume = 0.4;
  paper.play().catch(()=>{});
  
  switchScene("s2");

  setTimeout(()=>{
    switchScene("s3");
    captainSpeak();
  },20000);

  setTimeout(()=>{
    shiftToLover();
    switchScene("s4");
  },90000);

  setTimeout(()=>{
    switchScene("s5");
    typeText("You are my favorite place to land. Happy Birthday, Ashwini.");
  },150000);
}

function switchScene(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function showMsg(text){
  const box=document.getElementById("msgBox");
  box.innerText=text;
  box.classList.add("show");
  setTimeout(()=>box.classList.remove("show"),2500);
}

function captainSpeak(){
  paper.volume = 0.2;

  const utter = new SpeechSynthesisUtterance(
  "Good evening passengers. This flight is dedicated to the most beautiful girl on board, Ashwini. In flight refreshments are located in the dashboard. We expect smooth skies to Lonavala.");

  // attempt better voice
  const voices = speechSynthesis.getVoices();
  const preferred = voices.find(v => v.name.includes("Samantha") || v.lang.includes("en"));
  if(preferred) utter.voice = preferred;

  utter.rate = 0.9;
  speechSynthesis.speak(utter);
}

function shiftToLover(){
  let fade = setInterval(()=>{
    if(paper.volume > 0){
      paper.volume -= 0.02;
    } else {
      clearInterval(fade);
      paper.pause();
      lover.volume = 0;
      lover.play();
      fadeInLover();
      heartbeat();
    }
  },200);
}

function fadeInLover(){
  let fade = setInterval(()=>{
    if(lover.volume < 0.5){
      lover.volume += 0.02;
    } else clearInterval(fade);
  },200);
}

function heartbeat(){
  setInterval(()=>{
    document.body.style.transform="scale(1.01)";
    setTimeout(()=>document.body.style.transform="scale(1)",200);
  },1500);
}

function typeText(text){
  let i=0;
  const el=document.getElementById("finalText");
  const interval=setInterval(()=>{
    el.innerHTML += text.charAt(i);
    i++;
    if(i>=text.length) clearInterval(interval);
  },50);
}

/* particles */
setInterval(()=>{
  const p=document.createElement("div");
  p.className="particle";
  p.style.left=Math.random()*100+"vw";
  document.body.appendChild(p);
  setTimeout(()=>p.remove(),12000);
},600);

</script>
</body>
</html>
