<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Princess Airways ✈️</title>

<style>
body{
  margin:0;
  height:100svh;
  overflow:hidden;
  font-family:Georgia, serif;
  display:flex;
  justify-content:center;
  align-items:center;
  color:white;
  background: linear-gradient(135deg,#ff9ecf,#ffc3a0,#ffb6f9,#a0e7ff);
  background-size:400% 400%;
  animation:gradient 18s ease infinite;
}

@keyframes gradient{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

.screen{
  position:absolute;
  inset:0;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:20px;
  opacity:0;
  pointer-events:none;
  transition:0.7s;
}

.screen.active{
  opacity:1;
  pointer-events:auto;
}

.card{
  backdrop-filter: blur(20px);
  background:rgba(255,255,255,0.25);
  padding:35px;
  border-radius:28px;
  box-shadow:0 0 50px rgba(255,255,255,0.6);
}

button{
  margin-top:20px;
  padding:12px 26px;
  border:none;
  border-radius:30px;
  background:white;
  color:#ff3e9e;
  font-size:16px;
}

.panel{
  margin:15px;
  padding:18px 30px;
  border-radius:40px;
  background:rgba(255,255,255,0.4);
  backdrop-filter:blur(15px);
  font-size:18px;
}

.bottomSheet{
  position:absolute;
  bottom:-100%;
  width:100%;
  background:rgba(255,255,255,0.9);
  color:#ff3e9e;
  padding:30px;
  text-align:center;
  transition:0.4s;
  border-radius:30px 30px 0 0;
}

.bottomSheet.show{
  bottom:0;
}

h1,h2{
  text-shadow:0 0 20px rgba(255,255,255,0.6);
}
</style>
</head>
<body>

<!-- SCENE 1 -->
<div class="screen active" id="s1">
  <div class="card">
    <h2>Princess Airways</h2>
    <p>
      Passenger: <strong>Ashwini</strong><br>
      Seat: 13A<br>
      Gate: 1989<br>
      Flight: TS-13<br>
      Destination: Birthday Era
    </p>

    <div id="qrContainer"></div>

    <button onclick="scanPass()">💋 Kiss the Attendant to Confirm Boarding</button>
  </div>
</div>

<!-- SCENE 2 -->
<div class="screen" id="s2">
  <h2>Cabin Setup ✨</h2>
  <div class="panel" onclick="refreshments()">🍫 Refreshments</div>
  <div class="panel" onclick="seatbelt()">💺 Seatbelt</div>
  <div class="panel" onclick="princessMode()">👑 Princess Mode</div>
</div>

<!-- SCENE 3 -->
<div class="screen" id="s3">
  <h2 id="takeoffText">Preparing for Takeoff ✈️</h2>
</div>

<!-- SCENE 4 -->
<div class="screen" id="s4">
  <h1>Final Destination 🎂</h1>
  <p>You are my favorite place to land.</p>
  <p>Happy Birthday, Ashwini ❤️</p>
</div>

<div class="bottomSheet" id="sheet"></div>

<script>

// QR GENERATION
function generateQR(){
  const qrContainer = document.getElementById("qrContainer");
  const url = "https://nakulsuresh7.github.io/Birthday-/ticket.html";
  const img = document.createElement("img");
  img.src = "https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=" + encodeURIComponent(url);
  img.style.marginBottom = "20px";
  qrContainer.appendChild(img);
}
window.onload = generateQR;


// AUDIO SETUP
let audioContext;
let paperBuffer, loverBuffer, captainBuffer;
let paperSource, loverSource;
let paperGainNode, loverGainNode;
let fadeDone = false;

let cabinState = {
  refreshments:false,
  seatbelt:false,
  princess:false
};

async function scanPass(){
  switchScene("s2");
  initAudio();
}

function switchScene(id){
  document.querySelectorAll(".screen").forEach(s=>{
    s.classList.remove("active");
  });
  document.getElementById(id).classList.add("active");
}

async function initAudio(){
  try{
    audioContext = new (window.AudioContext || window.webkitAudioContext)();
    await audioContext.resume();

    paperBuffer = await loadAudio("paper-rings.mp3");
    loverBuffer = await loadAudio("lover.mp3");
    captainBuffer = await loadAudio("captain.mp3");

    startPaper();
  } catch(e){
    console.error("Audio init failed:", e);
  }
}

async function loadAudio(url){
  try{
    const response = await fetch(url);
    const arrayBuffer = await response.arrayBuffer();
    return await audioContext.decodeAudioData(arrayBuffer);
  } catch(e){
    console.error("Failed loading:", url, e);
    return null;
  }
}

function startPaper(){
  paperSource = audioContext.createBufferSource();
  paperSource.buffer = paperBuffer;

  paperGainNode = audioContext.createGain();
  paperGainNode.gain.value = 0.55;

  paperSource.connect(paperGainNode).connect(audioContext.destination);
  paperSource.start();

  if(captainBuffer){
    setTimeout(playCaptain,8000);
  }

  setTimeout(crossfade,45000);
}

function playCaptain(){
  paperGainNode.gain.linearRampToValueAtTime(
    0.25,
    audioContext.currentTime + 0.5
  );

  const captainSource = audioContext.createBufferSource();
  captainSource.buffer = captainBuffer;

  const captainGain = audioContext.createGain();
  captainGain.gain.value = 1;

  captainSource.connect(captainGain).connect(audioContext.destination);
  captainSource.start();

  setTimeout(()=>{
    paperGainNode.gain.linearRampToValueAtTime(
      0.55,
      audioContext.currentTime + 1
    );
  },8000);
}

function crossfade(){
  if(fadeDone) return;
  fadeDone = true;

  loverSource = audioContext.createBufferSource();
  loverSource.buffer = loverBuffer;

  loverGainNode = audioContext.createGain();
  loverGainNode.gain.value = 0;

  loverSource.connect(loverGainNode).connect(audioContext.destination);
  loverSource.start();

  loverGainNode.gain.linearRampToValueAtTime(
    0.6,
    audioContext.currentTime + 4
  );

  paperGainNode.gain.linearRampToValueAtTime(
    0,
    audioContext.currentTime + 4
  );
}


// CABIN LOGIC

function refreshments(){
  if(!cabinState.refreshments){
    cabinState.refreshments = true;
    showSheet("Snack drawer unlocked 🍫 Princess fuel secured.");
    checkCabinReady();
  }
}

function seatbelt(){
  if(!cabinState.seatbelt){
    cabinState.seatbelt = true;
    showSheet("Seatbelt secured. You're officially stuck with me 💕");
    checkCabinReady();
  }
}

function princessMode(){
  if(!cabinState.princess){
    cabinState.princess = true;
    showSheet("Princess Mode Activated 👑 Maximum glow engaged.");
    checkCabinReady();
  }
}

function checkCabinReady(){
  if(
    cabinState.refreshments &&
    cabinState.seatbelt &&
    cabinState.princess
  ){
    setTimeout(startTakeoff,1500);
  }
}

function startTakeoff(){
  switchScene("s3");

  const text = document.getElementById("takeoffText");

  setTimeout(()=>{ text.innerText = "Runway lights aligned..."; },2000);
  setTimeout(()=>{ text.innerText = "Cleared for departure..."; },4000);
  setTimeout(()=>{ text.innerText = "Taking off for Birthday Era..."; },6000);
  setTimeout(()=>{ switchScene("s4"); },9000);
}

function showSheet(text){
  const sheet=document.getElementById("sheet");
  sheet.innerText=text;
  sheet.classList.add("show");
  setTimeout(()=>sheet.classList.remove("show"),2500);
}

</script>

</body>
</html>
