<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Princess Airways ✈️</title>

<style>
body{
  margin:0;
  overflow:hidden;
  height:100svh;
  font-family: "Georgia", serif;
  display:flex;
  justify-content:center;
  align-items:center;
  background: linear-gradient(135deg,#ffb6d9,#ffc3a0,#d8b4f8,#a0e7ff);
  background-size:400% 400%;
  animation:gradient 20s ease infinite;
  color:white;
}

@keyframes gradient{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

.screen{
  position:absolute;
  inset:0;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  opacity:0;
  transition:1s;
  pointer-events:none;
}

.screen.active{
  opacity:1;
  pointer-events:auto;
}

.card{
  backdrop-filter: blur(15px);
  background:rgba(255,255,255,0.2);
  padding:30px;
  border-radius:20px;
  box-shadow:0 0 40px rgba(255,255,255,0.3);
  transition:1s;
}

button{
  margin-top:20px;
  padding:12px 24px;
  border:none;
  border-radius:30px;
  background:white;
  color:#ff69b4;
  font-size:16px;
}

.particle{
  position:absolute;
  width:6px;
  height:6px;
  border-radius:50%;
  background:white;
  opacity:0.6;
  animation:float 10s linear infinite;
}

@keyframes float{
  from{transform:translateY(100vh);}
  to{transform:translateY(-10vh);}
}

.message{
  position:absolute;
  bottom:20%;
  font-size:18px;
  opacity:0;
  transition:0.8s;
}

.message.show{
  opacity:1;
}

.glow{
  text-shadow:0 0 15px white,0 0 30px pink;
}

.vignette{
  position:absolute;
  inset:0;
  box-shadow:inset 0 0 200px rgba(0,0,0,0.4);
  pointer-events:none;
}

</style>
</head>
<body>

<div class="vignette"></div>

<audio id="paper">
  <source src="paper-rings.mp3" type="audio/mpeg">
</audio>

<audio id="lover">
  <source src="lover.mp3" type="audio/mpeg">
</audio>

<audio id="engine" loop>
  <source src="engine.mp3" type="audio/mpeg">
</audio>

<!-- SCREEN 1 -->
<div class="screen active" id="s1">
  <div class="card" id="boardingCard">
    <h2>Princess Airways</h2>
    <p>
      Passenger: <strong>Ashwini Parande</strong><br>
      Seat: 13A<br>
      Gate: 1989<br>
      Flight: TS-13<br>
      Destination: Birthday Era
    </p>
    <button onclick="startFlight()">Tap to Begin Takeoff</button>
  </div>
</div>

<!-- SCREEN 2 -->
<div class="screen" id="s2">
  <h2>Welcome Aboard, Ashwini ✈️</h2>
  <div>
    <button onclick="showMsg('Princess-approved KitKat minis located in dashboard.')">🍫 Refreshments</button>
    <button onclick="showMsg('Seatbelt secured. You are stuck with me forever.')">💺 Seatbelt</button>
    <button onclick="showMsg('Princess status: Confirmed.')">👑 Princess Mode</button>
  </div>
</div>

<!-- SCREEN 3 -->
<div class="screen" id="s3">
  <h2 class="glow">Final Destination: Birthday Era</h2>
  <h3 id="finalText"></h3>
</div>

<div class="message" id="msgBox"></div>

<script>

const paper = document.getElementById("paper");
const lover = document.getElementById("lover");
const engine = document.getElementById("engine");

function startFlight(){

  document.getElementById("boardingCard").style.transform="translateY(-120vh)";
  setTimeout(()=>{
    document.getElementById("s1").classList.remove("active");
    document.getElementById("s2").classList.add("active");
  },800);

  paper.volume=0.4;
  engine.volume=0.2;
  paper.play();
  engine.play();

  setTimeout(captainSpeak,8000);
  setTimeout(shiftMusic,90000);
  setTimeout(landing,210000);
}

function captainSpeak(){
  paper.volume=0.2;
  const speech=new SpeechSynthesisUtterance(
  "Good evening passengers. This flight is dedicated to the most beautiful girl on board, Ashwini Parande. In flight refreshments are located in the dashboard. We expect smooth skies to Lonavala.");
  speech.rate=0.9;
  speechSynthesis.speak(speech);
}

function shiftMusic(){
  let fade=setInterval(()=>{
    if(paper.volume>0){
      paper.volume-=0.02;
    }else{
      clearInterval(fade);
      paper.pause();
      lover.volume=0;
      lover.play();
      heartbeat();
      fadeInLover();
    }
  },200);
}

function fadeInLover(){
  let fade=setInterval(()=>{
    if(lover.volume<0.5){
      lover.volume+=0.02;
    }else clearInterval(fade);
  },200);
}

function heartbeat(){
  setInterval(()=>{
    document.body.style.transform="scale(1.01)";
    setTimeout(()=>document.body.style.transform="scale(1)",200);
  },1500);
}

function landing(){
  document.getElementById("s2").classList.remove("active");
  document.getElementById("s3").classList.add("active");
  typeText("You are my favorite place to land. Happy Birthday, Ashwini.");
}

function typeText(text){
  let i=0;
  const el=document.getElementById("finalText");
  const interval=setInterval(()=>{
    el.innerHTML+=text.charAt(i);
    i++;
    if(i>=text.length) clearInterval(interval);
  },50);
}

function showMsg(text){
  const box=document.getElementById("msgBox");
  box.innerText=text;
  box.classList.add("show");
  setTimeout(()=>box.classList.remove("show"),2500);
}

/* particles */
setInterval(()=>{
  const p=document.createElement("div");
  p.className="particle";
  p.style.left=Math.random()*100+"vw";
  document.body.appendChild(p);
  setTimeout(()=>p.remove(),10000);
},500);

</script>
</body>
</html>
