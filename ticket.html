<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boarding Pass ✈️</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:Georgia, serif;
  background: linear-gradient(135deg,#ff9ecf,#ffc3a0,#ffb6f9,#a0e7ff);
  background-size:400% 400%;
  animation:gradient 15s ease infinite;
}

@keyframes gradient{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

.ticket{
  width:95%;
  max-width:420px;
  background:white;
  border-radius:20px;
  position:relative;
  box-shadow:0 20px 60px rgba(0,0,0,0.2);
  overflow:hidden;
}

/* perforation effect */
.ticket:before,
.ticket:after{
  content:"";
  position:absolute;
  left:0;
  right:0;
  height:20px;
  background:radial-gradient(circle at 10px -5px, transparent 12px, white 13px);
  background-size:20px 20px;
}

.ticket:before{
  top:-10px;
}

.ticket:after{
  bottom:-10px;
  transform:rotate(180deg);
}

.header{
  padding:20px;
  background: linear-gradient(135deg,#ff9ecf,#ffb6f9);
  color:white;
  text-align:center;
}

.header h2{
  margin:0;
  letter-spacing:1px;
}

.body{
  padding:20px;
  color:#333;
}

.row{
  display:flex;
  justify-content:space-between;
  margin:8px 0;
  font-size:14px;
}

.big{
  font-size:18px;
  font-weight:bold;
}

.stamp{
  margin-top:20px;
  padding:10px;
  border:2px dashed #ff3e9e;
  text-align:center;
  color:#ff3e9e;
  font-weight:bold;
  transform:rotate(-8deg);
  opacity:0.8;
}

.footer{
  padding:15px;
  text-align:center;
  font-size:12px;
  background:#f7f7f7;
}

.shimmer{
  position:absolute;
  top:0;
  left:-100%;
  width:50%;
  height:100%;
  background:linear-gradient(120deg,transparent,rgba(255,255,255,0.6),transparent);
  animation:shine 3s infinite;
}

@keyframes shine{
  0%{left:-100%;}
  100%{left:150%;}
}
</style>
</head>
<body>

<div class="ticket">
  <div class="shimmer"></div>

  <div class="header">
    <h2>PRINCESS AIRWAYS</h2>
    <div>BOARDING PASS</div>
  </div>

  <div class="body">
    <div class="row"><span>Passenger</span><span class="big">Ashwini</span></div>
    <div class="row"><span>Seat</span><span>13A</span></div>
    <div class="row"><span>Gate</span><span>1989</span></div>
    <div class="row"><span>Flight</span><span>TS-13</span></div>
    <div class="row"><span>Destination</span><span>Birthday Era</span></div>

    <div class="stamp">PRINCESS CLASS CONFIRMED 👑</div>
  </div>

  <div class="footer">
    Screenshot this boarding pass. You’ll need it 💕
  </div>
</div>

</body>
</html>
